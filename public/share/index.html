<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Pet Chat</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page" aria-label="Pet Chat download page">
      <section class="phone-canvas">
        <img class="status-bar" src="./assets/status-bar.svg" alt="" aria-hidden="true" />

        <header class="brand" aria-label="Pet Chat">
          <img class="brand-icon" src="./assets/app-icon.svg" alt="" aria-hidden="true" />
          <span class="brand-name">Pet Chat</span>
        </header>

        <div class="figma-layers" data-figma-layers aria-label="Pet Chat app preview"></div>

        <footer class="download-panel" aria-label="Download Pet Chat">
          <button class="store-button" type="button" data-store-button aria-label="Download on the App Store">
            <span class="apple-mark" aria-hidden="true"></span>
            <span class="store-copy">
              <span class="store-kicker" data-i18n="download">Download on the</span>
              <strong>App Store</strong>
              <span class="store-suffix" data-i18n="downloadSuffix"></span>
            </span>
            <span class="store-arrow" aria-hidden="true"></span>
          </button>
          <p class="download-copy" data-i18n="caption">Scan, download, and decode more pet thoughts.</p>
          <img class="footer-pet" src="./assets/side-pet.svg" alt="" aria-hidden="true" />
        </footer>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
